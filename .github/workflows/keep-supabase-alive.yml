name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 8 * * *"   # runs every day at 08:00 UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://spuyevwccllqrnegvymh.supabase.co/rest/v1/")
          echo "Supabase ping status: $STATUS"
          # 200 = ok, 401 = project alive but needs auth (still counts as active)
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
            echo "✅ Supabase project is alive!"
          else
            echo "❌ Unexpected status: $STATUS"
            exit 1
          fi
